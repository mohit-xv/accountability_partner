AWSTemplateFormatVersion: "2010-09-09"
Description: Quest Board full-stack backend - Cognito auth, DynamoDB state, Lambda API, AI assistant proxy

Parameters:
  GeminiApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Google AI Studio key for the assistant (blank = assistant disabled)
  AiDailyLimit:
    Type: String
    Default: "200"
    Description: Max AI calls per user per day
  ModelId:
    Type: String
    Default: "gemini-flash-latest"
    Description: Gemini model id (auto-tracks the current flash model)
  SiteOrigin:
    Type: CommaDelimitedList
    Default: "*"
    Description: Allowed CORS origins (CDN + S3 website URL; * until the bucket exists)
  SiteDomain:
    Type: String
    Default: ""
    Description: S3 website domain to front with CloudFront (blank = no CDN yet)
  AdminEmail:
    Type: String
    Default: ""
    Description: Email of the community-chat admin (can delete messages and ban users)
  TgToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: Telegram bot token for feedback notifications (blank = disabled)
  TgChat:
    Type: String
    Default: ""
    Description: Telegram chat id to send feedback notifications to

  SenderEmail:
    Type: String
    Default: ""
    Description: Verified SES sender for streak-reminder emails (blank = reminders off)

Conditions:
  HasSite: !Not [!Equals [!Ref SiteDomain, ""]]
  HasSender: !Not [!Equals [!Ref SenderEmail, ""]]

Resources:

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: questboard-users
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireSymbols: false
          RequireNumbers: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: questboard-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      RefreshTokenValidity: 30

  StateTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: questboard-state
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  FnRole:  # state Lambda: full table access + user listing, no email powers
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ddb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:DeleteItem, dynamodb:Scan, dynamodb:Query]
                Resource:
                  - !GetAtt StateTable.Arn
                  - !Sub "${StateTable.Arn}/index/*"
              - Effect: Allow
                Action: [cognito-idp:ListUsers]
                Resource: !GetAtt UserPool.Arn

  AiRole:  # AI proxy: counter updates only — no scans, no email, no user listing
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ddb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:UpdateItem]
                Resource: !GetAtt StateTable.Arn

  ReminderRole:  # reminder: read-only table + user listing + send from our identities only
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: remind
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:Scan, dynamodb:PutItem]
                Resource: !GetAtt StateTable.Arn
              - Effect: Allow
                Action: [cognito-idp:ListUsers]
                Resource: !GetAtt UserPool.Arn
              - Effect: Allow
                Action: [ses:SendEmail]
                Resource: !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*"

  StateFn:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: questboard-state
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt FnRole.Arn
      Environment:
        Variables: { TABLE: !Ref StateTable, ADMIN: !Ref AdminEmail, TG_TOKEN: !Ref TgToken, TG_CHAT: !Ref TgChat, POOL: !Ref UserPool }
      Code: lambda/state

  AiFn:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: questboard-ai
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 25
      Role: !GetAtt AiRole.Arn
      Environment:
        Variables:
          TABLE: !Ref StateTable
          GKEY: !Ref GeminiApiKey
          LIMIT: !Ref AiDailyLimit
          MODEL: !Ref ModelId
      Code: lambda/ai

  ReminderFn:
    Type: AWS::Lambda::Function
    Condition: HasSender
    Properties:
      FunctionName: questboard-reminder
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 120
      Role: !GetAtt ReminderRole.Arn
      Environment:
        Variables:
          TABLE: !Ref StateTable
          POOL: !Ref UserPool
          SENDER: !Ref SenderEmail
          SITE: !If [HasSite, !Sub "https://${Cdn.DomainName}", ""]
      Code: lambda/reminder

  ReminderRule:
    Type: AWS::Events::Rule
    Condition: HasSender
    Properties:
      Description: Daily streak-risk email at 20:00 IST
      ScheduleExpression: cron(30 14 * * ? *)
      Targets:
        - Arn: !GetAtt ReminderFn.Arn
          Id: reminder

  ReminderInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: HasSender
    Properties:
      FunctionName: !Ref ReminderFn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ReminderRule.Arn

  Api:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: questboard-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: !Ref SiteOrigin
        AllowMethods: [GET, PUT, POST, OPTIONS]
        AllowHeaders: [authorization, content-type]

  JwtAuth:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref Api
      AuthorizerType: JWT
      Name: cognito
      IdentitySource: ["$request.header.Authorization"]
      JwtConfiguration:
        Audience: [!Ref UserPoolClient]
        Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"

  Integration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt StateFn.Arn
      PayloadFormatVersion: "2.0"

  RouteGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: "GET /state"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuth
      Target: !Sub "integrations/${Integration}"

  RoutePut:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: "PUT /state"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuth
      Target: !Sub "integrations/${Integration}"

  IntegrationAi:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt AiFn.Arn
      PayloadFormatVersion: "2.0"

  RouteFeedback:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: "POST /feedback"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuth
      Target: !Sub "integrations/${Integration}"

  RouteStats:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: "GET /stats"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuth
      Target: !Sub "integrations/${Integration}"

  RouteCommunityGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: "GET /community"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuth
      Target: !Sub "integrations/${Integration}"

  RouteCommunityPost:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: "POST /community"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuth
      Target: !Sub "integrations/${Integration}"

  RouteAi:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: "POST /ai"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuth
      Target: !Sub "integrations/${IntegrationAi}"

  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref Api
      StageName: "$default"
      AutoDeploy: true

  FnPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StateFn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/*/state"

  StatsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StateFn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/*/stats"

  CommunityPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StateFn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/*/community"

  FeedbackPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StateFn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/*/feedback"

  AiFnPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AiFn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/*/ai"

  Cdn:
    Type: AWS::CloudFront::Distribution
    Condition: HasSite
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: accountability partner site
        HttpVersion: http2
        PriceClass: PriceClass_200
        Origins:
          - Id: s3site
            DomainName: !Ref SiteDomain
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: s3site
          ViewerProtocolPolicy: redirect-to-https
          # Managed-CachingDisabled: single small HTML file, always fresh, no invalidations needed
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          Compress: true

Outputs:
  ApiUrl:
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com"
  CdnUrl:
    Condition: HasSite
    Value: !Sub "https://${Cdn.DomainName}"
  UserPoolId:
    Value: !Ref UserPool
  ClientId:
    Value: !Ref UserPoolClient
